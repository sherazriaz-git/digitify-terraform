name: Terraform CI/CD

on:
  push:  # This will trigger on all commits to any branch
  pull_request:  # This will trigger on all pull request events

jobs:
  run-terraform-best-practices:
    uses: ./.github/workflows/terraform-best-practices.yml
    with:
      working-directory: './terraform' # Adjust the path if Terraform files are in a subdirectory
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

