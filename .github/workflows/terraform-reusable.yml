name: Terraform Reusable

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout
  pull-requests: write # This is required to add comments to Pull Requests
  deployments: write # This is required to deactivate deployments

on: push

jobs:
  terraform-validate:
    name: Terraform Init and Validate
    runs-on: ubuntu-latest
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Terraform Init
        id: init
        uses: ./.github/actions/terraform-init
        with:
          aws-region: us-east-1
          terraform-execution-iam-role-arn: arn:aws:iam::099199746132:role/github-oidc-provider-aws
          working-directory: prod

  terraform-plan:
    if: github.ref == 'refs/heads/dev'
    name: Terraform Init and Validate
    runs-on: ubuntu-latest
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Terraform Init
        id: init
        uses: ./.github/actions/terraform-init
        with:
          aws-region: us-east-1
          terraform-execution-iam-role-arn: arn:aws:iam::099199746132:role/github-oidc-provider-aws
          working-directory: prod

      - name: Terraform Plan
        id: plan
        uses: ./.github/actions/terraform-plan
        with:
          github-token: ${{ secrets.TOKEN_GITHUB }}
          deploy: true
          aws-region: us-east-1
          working-directory: prod

  terraform-apply:
    needs: [terraform-plan]
    name: Terraform Apply
    if: (github.ref_name == 'dev' && needs.terraform-plan.outputs.exitcode == 2)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Terraform Init
        id: init
        uses: ./.github/actions/terraform-init
        with:
          aws-region: us-east-1
          terraform-execution-iam-role-arn: arn:aws:iam::099199746132:role/github-oidc-provider-aws
          working-directory: prod

      - name: Terraform Plan
        id: plan
        uses: ./.github/actions/terraform-apply
        with:
          deploy: true
          working-directory: prod
