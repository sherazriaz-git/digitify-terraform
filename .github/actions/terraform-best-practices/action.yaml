name: Terraform Best Practices

on:
  workflow_call:
    inputs:
      working-directory:
        description: 'Path to the Terraform configuration directory'
        required: false
        default: '.'
    secrets:
      AWS_ROLE_ARN:
        description: 'AWS IAM Role for GitHub Actions'

jobs:
  terraform-best-practices:
    name: Run Terraform Best Practices
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0 # Adjust to your preferred version
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Configure AWS Credentials
        if: secrets.AWS_ROLE_ARN
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1 # Adjust as needed

      - name: Run `terraform fmt` to check formatting
        run: terraform fmt -check -recursive

      - name: Run `terraform validate`
        run: terraform validate

      - name: Check for unused resources or issues
        run: terraform init && terraform plan -no-color

